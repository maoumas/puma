<html lang="es">
<head>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brand: #D35400;
  --dark:  #1a1f2e;
  --border:#e0dbd4;
  --green: #27ae60;
  --blue:  #2980b9;
  --codebg:#1e2436;
}
html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f5f3f0;
  color: var(--dark);
  overflow: hidden;
}
#root { display: flex; flex-direction: column; height: 100dvh; }

/* HEADER */
#hdr {
flex-shrink: 0; background: #fff;
border-bottom: 1px solid var(–border);
padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
}
.logo { font-size: 20px; font-weight: 800; color: var(–dark); text-decoration: none; }
.logo b { color: var(–brand); }
.badge { font-size: 11px; background: var(–brand); color: #fff; padding: 2px 8px; border-radius: 20px; font-weight: 700; }
.hl { font-size: 13px; color: #888; text-decoration: none; margin-left: 8px; }

/* TABS */
#tabs { flex-shrink: 0; display: flex; background: #fff; border-bottom: 1px solid var(–border); }
.tab {
flex: 1; padding: 11px 0; border: none; background: none;
font-family: inherit; font-size: 13px; font-weight: 700;
color: #aaa; cursor: pointer; border-bottom: 3px solid transparent;
}
.tab.on { color: var(–brand); border-bottom-color: var(–brand); }

/* PANELS */
#panels { flex: 1; overflow: hidden; position: relative; }
.panel {
position: absolute; inset: 0;
display: flex; flex-direction: column;
visibility: hidden; pointer-events: none;
}
.panel.on { visibility: visible; pointer-events: auto; }

/* TOOLBAR */
.tb {
flex-shrink: 0; background: #fff;
border-bottom: 1px solid var(–border);
padding: 8px 12px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.tbtitle {
font-size: 11px; font-weight: 800; letter-spacing: .08em;
text-transform: uppercase; color: #bbb; margin-right: 4px;
}

/* BUTTONS */
.btn {
display: inline-flex; align-items: center; gap: 4px;
padding: 7px 12px; border-radius: 7px; border: 1px solid var(–border);
background: #fff; font-family: inherit; font-size: 12px; font-weight: 700;
color: var(–dark); cursor: pointer; white-space: nowrap;
-webkit-tap-highlight-color: transparent;
}
.btn:active { opacity: .7; }
.p  { background: var(–brand); color: #fff; border-color: var(–brand); }
.g  { background: var(–green); color: #fff; border-color: var(–green); }
.b  { background: var(–blue);  color: #fff; border-color: var(–blue); }
.r  { color: #e74c3c; border-color: rgba(231,76,60,.3); }
.o  { background: #e67e22; color: #fff; border-color: #e67e22; }

/* TEXTAREA */
#inp {
flex: 1; width: 100%; border: none; outline: none; resize: none;
padding: 16px; font-family: “Menlo”,“Monaco”,monospace;
font-size: 14px; line-height: 1.75;
background: #faf9f7; color: var(–dark);
-webkit-overflow-scrolling: touch; overflow-y: auto;
}

/* STATUS BAR */
.sb {
flex-shrink: 0; padding: 6px 14px; background: #fff;
border-top: 1px solid var(–border);
display: flex; justify-content: space-between; font-size: 11px; color: #bbb;
}
.ok  { color: var(–green); font-weight: 700; }
.err { color: #e74c3c; font-weight: 700; }

/* PREVIEW AREA */
#pv {
flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
padding: 20px 18px 40px; background: #fff;
}

/* ── RENDERED STYLES ── */
#pv h1 { font-size: 22px; font-weight: 800; color: var(–brand); border-bottom: 2px solid var(–brand); padding-bottom: 6px; margin: 20px 0 10px; }
#pv h2 { font-size: 17px; font-weight: 700; border-left: 4px solid var(–brand); padding-left: 10px; margin: 18px 0 8px; }
#pv h3 { font-size: 15px; font-weight: 700; color: #555; margin: 14px 0 6px; }
#pv p  { font-size: 15px; line-height: 1.75; margin: 6px 0; }
#pv strong { color: var(–brand); font-weight: 700; }
#pv em { font-style: italic; color: #666; }
#pv a  { color: var(–blue); text-underline-offset: 3px; }
#pv ul, #pv ol { margin: 6px 0 6px 22px; line-height: 1.8; }
#pv li { font-size: 15px; margin: 2px 0; }
#pv blockquote { border-left: 4px solid #f0a07a; background: #fff8f5; padding: 10px 14px; margin: 12px 0; border-radius: 0 8px 8px 0; color: #666; font-style: italic; }
#pv mark { background: #fff3cd; color: #856404; padding: 1px 4px; border-radius: 3px; }
#pv hr   { border: none; border-top: 2px dashed var(–border); margin: 18px 0; }
#pv del  { opacity: .5; }
#pv .sn  { background: #eef5ff; border-left: 4px solid var(–blue); padding: 10px 13px; border-radius: 0 8px 8px 0; font-size: 13px; color: #2c5f8a; margin: 10px 0; }
#pv ul.tl { list-style: none; padding-left: 2px; }
#pv ul.tl li { display: flex; align-items: flex-start; gap: 8px; margin: 5px 0; }
#pv ul.tl li input { margin-top: 3px; accent-color: var(–brand); flex-shrink: 0; }

/* ── CODE BLOCKS ── */
#pv pre {
background: var(–codebg); border-radius: 10px;
margin: 14px 0; overflow: hidden;
box-shadow: 0 4px 14px rgba(0,0,0,.2);
}
.cb {
background: #2a3148; padding: 7px 14px;
display: flex; justify-content: space-between; align-items: center;
}
.cl { font-size: 11px; font-weight: 700; color: #fab1a0; letter-spacing: .06em; text-transform: uppercase; font-family: monospace; }
.cc {
background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
color: #ddd; padding: 5px 12px; border-radius: 6px;
font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
display: inline-flex; align-items: center; gap: 5px; min-height: 30px;
-webkit-tap-highlight-color: transparent;
}
.cc:active { background: rgba(255,255,255,.25); }
.cc.done   { background: var(–green); border-color: var(–green); color: #fff; }

#pv pre code {
display: block; padding: 14px 16px;
font-family: “Menlo”,“Monaco”,monospace; font-size: 13px;
line-height: 1.65; overflow-x: auto; white-space: pre; color: #e8d5b7; background: none;
}
#pv code { background: #f0ebe3; color: #c0392b; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 12px; font-weight: 600; }
#pv pre code { background: none; color: #e8d5b7; padding: 0; }
#pv table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 14px; }
#pv th { background: var(–brand); color: #fff; padding: 8px 12px; text-align: left; font-weight: 700; }
#pv td { padding: 8px 12px; border-bottom: 1px solid var(–border); }
#pv tr:nth-child(even) td { background: #faf9f7; }
.kw { color: #85c1e9; } .str { color: #a9dfbf; } .cmt { color: #7f8c8d; font-style: italic; } .num { color: #f9ca74; }

/* Empty state */
#es {
display: flex; flex-direction: column; align-items: center;
justify-content: center; height: 100%; gap: 10px;
color: #ccc; text-align: center; padding: 30px;
}
#es svg { opacity: .25; }
#es p { font-size: 14px; line-height: 1.6; }

/* Code detection hint highlight */
.code-hint { background: #fffbf0; border: 1px dashed #e67e22; border-radius: 4px; }

/* TOAST */
#toast {
position: fixed; bottom: 24px; left: 50%;
transform: translateX(-50%) translateY(70px);
background: var(–dark); color: #fff;
padding: 11px 22px; border-radius: 50px;
font-size: 13px; font-weight: 700;
transition: transform .25s ease;
z-index: 999; pointer-events: none; white-space: nowrap;
}
#toast.show  { transform: translateX(-50%) translateY(0); }
#toast.green { background: var(–green); }
#toast.red   { background: #e74c3c; }
#toast.orange { background: #e67e22; }
</style>

<script>
// ── TABS ────────────────────────────────────────────
function goTab(n) {
  document.getElementById('ti').className = 'tab' + (n==='i' ? ' on' : '');
  document.getElementById('tp').className = 'tab' + (n==='p' ? ' on' : '');
  document.getElementById('pi').className = 'panel' + (n==='i' ? ' on' : '');
  document.getElementById('pp').className = 'panel' + (n==='p' ? ' on' : '');
}

// ── TYPING: update stats ONLY, no render, no tab switch ──
var _rt = null;
function onType() {
  updStats();
  // Debounced render update in background — but NO tab switch
  clearTimeout(_rt);
  _rt = setTimeout(function() { renderSilent(); }, 800);
}

// Render without switching tab (background update)
function renderSilent() {
  var raw = document.getElementById('inp').value;
  var pv  = document.getElementById('pv');
  if (!raw.trim()) return;
  try {
    pv.innerHTML = parse(raw);
    var w = (pv.innerText || '').trim().split(/\s+/).length;
    document.getElementById('so').textContent = w + ' palabras';
    document.getElementById('sr').innerHTML = '<span class="ok">&#10003;</span>';
  } catch(e) {}
}

function updStats() {
  var v = document.getElementById('inp').value;
  var w = v.trim() ? v.trim().split(/\s+/).length : 0;
  document.getElementById('si').textContent = w + ' palabras · ' + v.length + ' chars';
}

// ── RENDER (with tab switch on mobile) ──────────────
function doRender() {
  var raw = document.getElementById('inp').value;
  var pv  = document.getElementById('pv');
  if (!raw.trim()) {
    pv.innerHTML = emptyHTML();
    document.getElementById('so').textContent = 'Sin contenido';
    document.getElementById('sr').textContent = '—';
    return;
  }
  try {
    pv.innerHTML = parse(raw);
    var w = (pv.innerText || '').trim().split(/\s+/).length;
    document.getElementById('so').textContent = w + ' palabras';
    document.getElementById('sr').innerHTML = '<span class="ok">&#10003; OK</span>';
    // Only switch tab on explicit Render press
    goTab('p');
  } catch(e) {
    document.getElementById('sr').innerHTML = '<span class="err">&#9888; Error</span>';
  }
  updStats();
}

function emptyHTML() {
  return '<div id="es"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><p>Pega tu Markdown<br>y pulsa <strong>&#9654; Render</strong></p></div>';
}

// ── DETECT & FIX FLAT CODE BLOCKS ───────────────────
// Wraps indented or language-labeled flat code sections in ```lang ... ```
function detectCode() {
  var ta  = document.getElementById('inp');
  var raw = ta.value;
  if (!raw.trim()) { toast('Pega primero el texto', 'red'); return; }

  var original = raw;
  var count = 0;

  // ── Strategy 1: lines already starting with 4 spaces or a tab (classic indented code)
  // Group consecutive indented lines and wrap them
  var lines = raw.split('\n');
  var result = [];
  var inBlock = false;
  var blockLines = [];
  var langGuess = '';

  function flushBlock() {
    if (!blockLines.length) return;
    // Dedent: remove leading 4 spaces or 1 tab
    var dedented = blockLines.map(function(l) {
      return l.replace(/^(    |\t)/, '');
    });
    result.push('```' + langGuess);
    result = result.concat(dedented);
    result.push('```');
    blockLines = [];
    langGuess = '';
    count++;
  }

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    // Skip lines already inside a ``` block
    var isIndented = /^(    |\t)/.test(line);

    if (isIndented) {
      if (!inBlock) { inBlock = true; }
      blockLines.push(line);
    } else {
      if (inBlock) { flushBlock(); inBlock = false; }
      result.push(line);
    }
  }
  if (inBlock) flushBlock();
  raw = result.join('\n');

  // ── Strategy 2: Lines that look like a language header followed by code
  // Pattern: a line that is ONLY a known language name (e.g. "python", "javascript", "bash")
  // followed by lines that look like code (contain = ; { } ( ) => or start with keywords)
  var langNames = ['javascript','python','bash','shell','sh','css','html','sql',
                   'json','yaml','typescript','java','c','cpp','php','ruby',
                   'swift','kotlin','go','rust','r','matlab'];
  var langRx = new RegExp('^(' + langNames.join('|') + ')\\s*$', 'i');

  raw = raw.replace(/\n([a-zA-Z]+)\n((?:[^\n]+\n){2,}?)(?=\n[^`\s]|\n```|$)/g,
    function(match, maybeLabel, codeBlock) {
      if (!langRx.test(maybeLabel)) return match;
      // Check codeBlock looks like code (has at least one code-like line)
      var hasCode = /[=;{}()\[\]=>]|^\s*(def |class |function |import |from |const |let |var |if |for |while )/.test(codeBlock);
      if (!hasCode) return match;
      count++;
      return '\n```' + maybeLabel.trim().toLowerCase() + '\n' + codeBlock + '```\n';
    }
  );

  // ── Strategy 3: Blocks of 3+ consecutive lines that look like code
  // (not already in ``` fences, not plain prose)
  // Detect by scoring each line: prose=0, code=1
  var fenced = [];
  // Mark existing ``` zones so we don't double-wrap
  raw = raw.replace(/```[\s\S]*?```/g, function(m) {
    fenced.push(m);
    return '\x02F' + (fenced.length-1) + '\x02';
  });

  var paraLines = raw.split('\n');
  var out2 = [];
  var codeBuf = [];
  var detectedLang = '';

  function isCodeLine(l) {
    if (!l.trim()) return false; // blank = neutral
    // Markdown structural lines are NOT code
    if (/^#{1,6} /.test(l)) return false;
    if (/^[-*+] /.test(l)) return false;
    if (/^\d+\. /.test(l)) return false;
    if (/^>/.test(l)) return false;
    // Strong code signals
    if (/[;{}()\[\]]/.test(l)) return true;
    if (/^\s*(def |class |function |import |from |const |let |var |if |for |while |return |print\()/.test(l)) return true;
    if (/=>|===|!==|\+\+|--|\/\//.test(l)) return true;
    if (/^\s{2,}\S/.test(l)) return true; // indented
    return false;
  }

  function guessLang(lines) {
    var text = lines.join('\n');
    if (/def |import |print\(|elif /.test(text)) return 'python';
    if (/const |let |var |=>|function /.test(text)) return 'javascript';
    if (/SELECT |FROM |WHERE |INSERT /i.test(text)) return 'sql';
    if (/<[a-z]+[\s>]/.test(text)) return 'html';
    if (/\$[A-Z_]+|echo |#!/.test(text)) return 'bash';
    return '';
  }

  function flushCodeBuf() {
    if (codeBuf.length < 3) {
      // Too short — push as-is
      out2 = out2.concat(codeBuf);
    } else {
      var lg = guessLang(codeBuf);
      out2.push('```' + lg);
      out2 = out2.concat(codeBuf);
      out2.push('```');
      count++;
    }
    codeBuf = [];
  }

  for (var j = 0; j < paraLines.length; j++) {
    var pl = paraLines[j];
    if (isCodeLine(pl)) {
      codeBuf.push(pl);
    } else {
      if (codeBuf.length) flushCodeBuf();
      out2.push(pl);
    }
  }
  if (codeBuf.length) flushCodeBuf();

  raw = out2.join('\n');

  // Restore fenced blocks
  raw = raw.replace(/\x02F(\d+)\x02/g, function(_, i) { return fenced[+i]; });

  if (raw === original || count === 0) {
    toast('No se detectaron bloques de código planos', 'orange');
    return;
  }

  ta.value = raw;
  updStats();
  toast(count + ' bloque' + (count>1?'s':'') + ' de código detectado' + (count>1?'s':'') + ' ✓', 'green');
}

// ── MARKDOWN PARSER ──────────────────────────────────
function parse(raw) {
  if (!raw.trim()) return '';

  var blocks = [];
  var t = raw.replace(/```(\w*)\r?\n([\s\S]*?)```/g, function(_, lang, code) {
    blocks.push({ lang: lang.trim(), code: code });
    return '\x01B' + (blocks.length - 1) + '\x01';
  });

  var inlines = [];
  t = t.replace(/`([^`\n]+)`/g, function(_, c) {
    inlines.push(c);
    return '\x01I' + (inlines.length - 1) + '\x01';
  });

  var lines = t.split('\n');
  var out = [];
  var inUL = false, inOL = false, inTL = false;
  var tbl = [], inTbl = false;

  function closeList() {
    if (inTL) { out.push('</ul>'); inTL = false; }
    if (inUL) { out.push('</ul>'); inUL = false; }
    if (inOL) { out.push('</ol>'); inOL = false; }
  }
  function flushTbl() {
    if (!inTbl) return;
    inTbl = false;
    if (!tbl.length) { tbl = []; return; }
    var h = '<table>';
    tbl.forEach(function(row, i) {
      var cells = row.split('|').map(function(c){ return c.trim(); }).filter(Boolean);
      if (cells.every(function(c){ return /^[-:]+$/.test(c); })) return;
      var tag = i === 0 ? 'th' : 'td';
      h += '<tr>' + cells.map(function(c){ return '<' + tag + '>' + il(c) + '</' + tag + '>'; }).join('') + '</tr>';
    });
    out.push(h + '</table>');
    tbl = [];
  }

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];

    if (/\x01B(\d+)\x01/.test(line)) {
      closeList(); flushTbl();
      var m   = line.match(/\x01B(\d+)\x01/);
      var blk = blocks[+m[1]];
      var esc = eh(blk.code);
      var lbl = blk.lang || 'code';
      var icon = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      out.push(
        '<pre>' +
          '<div class="cb">' +
            '<span class="cl">' + lbl + '</span>' +
            '<button class="cc" onclick="cpCode(this)">' + icon + ' Copiar</button>' +
          '</div>' +
          '<code>' + hi(esc, blk.lang) + '</code>' +
        '</pre>'

```
  );
  continue;
}

if (/^\|.+\|/.test(line)) { closeList(); inTbl = true; tbl.push(line); continue; }
else if (inTbl) flushTbl();

if (/^(-{3,}|\*{3,}|_{3,})\s*$/.test(line.trim())) { closeList(); out.push('<hr>'); continue; }

var hm = line.match(/^(#{1,6})\s+(.+)/);
if (hm) { closeList(); flushTbl(); out.push('<h' + hm[1].length + '>' + il(hm[2]) + '</h' + hm[1].length + '>'); continue; }

if (line.startsWith('> ')) { closeList(); out.push('<blockquote>' + il(line.slice(2)) + '</blockquote>'); continue; }

var tm = line.match(/^[-*] \[( |x|X)\] (.+)/);
if (tm) {
  if (!inTL) { closeList(); out.push('<ul class="tl">'); inTL = true; }
  var chk = tm[1].toLowerCase() === 'x' ? ' checked' : '';
  out.push('<li><input type="checkbox"' + chk + ' onclick="return false"><span>' + il(tm[2]) + '</span></li>');
  continue;
}

var um = line.match(/^[-*+] (.+)/);
if (um) {
  if (inOL) { out.push('</ol>'); inOL = false; }
  if (inTL) { out.push('</ul>'); inTL = false; }
  if (!inUL) { out.push('<ul>'); inUL = true; }
  out.push('<li>' + il(um[1]) + '</li>'); continue;
}

var om = line.match(/^\d+\. (.+)/);
if (om) {
  if (inUL) { out.push('</ul>'); inUL = false; }
  if (inTL) { out.push('</ul>'); inTL = false; }
  if (!inOL) { out.push('<ol>'); inOL = true; }

// ── INLINE ──────────────────────────────────────────
function il(t) {
t = t.replace(/**Side note:**\s*(.*)/gi, ‘<span class="sn">📌 <strong>Side note:</strong> $1</span>’);
t = t.replace(/==(.+?)==/g, ‘<mark>$1</mark>’);
t = t.replace(/**(.+?)**/g, ‘<strong>$1</strong>’);
t = t.replace(/(?<!*)*([^*\n]+?)*(?!*)/g, ‘<em>$1</em>’);
t = t.replace(/*([^*\n]+?)_/g, ‘<em>$1</em>’);
t = t.replace(/~(.+?)~/g, ‘<del>$1</del>’);
t = t.replace(/[([^]]+)](([^)]+))/g, ‘<a href="$2" target="_blank">$1</a>’);
return t;
}

// ── ESCAPE HTML ─────────────────────────────────────
function eh(s) {
return s.replace(/&/g, ‘&’).replace(/</g, ‘<’).replace(/>/g, ‘>’);
}

// ── SYNTAX HIGHLIGHT ────────────────────────────────
function hi(code, lang) {
if (!lang) return code;
var l = lang.toLowerCase();
var isJS = [‘js’,‘javascript’,‘jsx’,‘ts’,‘typescript’,‘tsx’].indexOf(l) > -1;
var isPY = [‘py’,‘python’].indexOf(l) > -1;
if (isJS) code = code.replace(/\b(const|let|var|function|return|if|else|for|while|class|import|export|from|default|new|this|typeof|await|async|try|catch|throw|null|undefined|true|false)\b/g, ‘<span class="kw">$1</span>’);
if (isPY) code = code.replace(/\b(def|class|return|if|elif|else|for|while|import|from|as|with|pass|break|continue|lambda|yield|not|and|or|in|is|True|False|None|print)\b/g, ‘<span class="kw">$1</span>’);
code = code.replace(/(//[^\n]*)$/gm, ‘<span class="cmt">$1</span>’);
code = code.replace(/(#[^\n]*)$/gm, ‘<span class="cmt">$1</span>’);
code = code.replace(/\b(\d+.?\d*)\b/g, ‘<span class="num">$1</span>’);
return code;
}

// ── COPY CODE BLOCK ──────────────────────────────────
function cpCode(btn) {
var code = btn.closest(‘pre’).querySelector(‘code’);
var txt  = code.innerText || code.textContent;
navigator.clipboard.writeText(txt)
.then(function(){ markCopied(btn); })
.catch(function(){ fbCopy(txt); markCopied(btn); });
}
function markCopied(btn) {
var orig = btn.innerHTML;
btn.innerHTML = ‘✓ Copiado’;
btn.classList.add(‘done’);
setTimeout(function(){ btn.innerHTML = orig; btn.classList.remove(‘done’); }, 2000);
}

// ── FALLBACK COPY ────────────────────────────────────
function fbCopy(text) {
var el = document.createElement(‘textarea’);
el.value = text;
el.style.cssText = ‘position:fixed;top:-999px;left:-999px;opacity:0’;
document.body.appendChild(el);
el.select(); el.setSelectionRange(0, 99999);
document.execCommand(‘copy’);
document.body.removeChild(el);
}
